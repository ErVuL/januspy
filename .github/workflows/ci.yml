name: CI

on:
  push:
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with reference submodule)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake \
            libfftw3-dev libsndfile1-dev libportaudio2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build the reference and create the venv
        run: ./install.sh

      - name: Install januspy with test extras
        run: .venv/bin/pip install -e ".[dev]"

      - name: Run the test suite
        run: .venv/bin/python -m pytest -q
